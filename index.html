<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finance Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>💰 Finance Dashboard</h1>

  <div class="header-right">
    <select id="roleSelect">
      <option value="viewer">Viewer</option>
      <option value="admin">Admin</option>
    </select>

    <button id="themeToggle">🌙</button>
  </div>
</header>

<section class="summary">
  <div class="card" id="balanceCard">₹0</div>
  <div class="card income" id="incomeCard">₹0</div>
  <div class="card expense" id="expenseCard">₹0</div>
</section>

<section class="controls">
  <input type="text" id="search" placeholder="Search category..." />
  
  <select id="filterType">
    <option value="all">All</option>
    <option value="income">Income</option>
    <option value="expense">Expense</option>
  </select>

  <button id="addBtn">+ Add</button>
  <button id="exportBtn">Export CSV</button>
</section>

<section class="charts">
  <!-- Line Chart on top -->
  <canvas id="lineChart"></canvas>
  <!-- Pie Chart below -->
  <canvas id="pieChart"></canvas>
</section>

<table>
  <thead>
    <tr>
      <th>Date</th>
      <th>Category</th>
      <th>Amount</th>
      <th>Type</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="transactionTable"></tbody>
</table>

<div id="emptyState" class="empty">No transactions found</div>

<section class="insights" id="insights"></section>

<!-- Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modalTitle">Add Transaction</h2>

    <label for="cat">Category</label>
    <input id="cat" type="text" placeholder="Enter category" />

    <label for="amt">Amount</label>
    <input id="amt" type="number" placeholder="Enter amount" />

    <label for="type">Type</label>
    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <div class="badges-preview" id="badgesPreview" style="display:none;">
      <!-- badges injected by JS -->
    </div>

    <div class="modal-actions">
      <button id="cancelBtn" class="btn-outline">Cancel</button>
      <button id="saveBtn" class="btn-primary">Save</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
